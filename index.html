<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern To-Do App</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="todo-container" id="todoContainer">
    <div class="header">
      <h1>
        <i class="fas fa-check-circle"></i> Todo List
      </h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-sun"></i>
      </button>
    </div>

    <!-- Input area -->
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Add a new task..." autofocus>
      <button id="addBtn"><i class="fas fa-plus"></i></button>
    </div>

    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task list -->
    <ul class="todo-list" id="todoList"></ul>

    <!-- Footer with count and clear completed -->
    <div class="footer">
      <span id="taskCount">0 items left</span>
      <button class="clear-completed" id="clearCompleted">Clear completed</button>
    </div>
  </div>
    <script src="script.js"></script>
</body>
</html>
